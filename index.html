<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode — Empresa Base</title>
<style>
  body { font-family: system-ui, sans-serif; background: #080c14; color: #e2e8f0; display: grid; place-items: center; min-height: 100vh; margin: 0; text-align: center; }
  h1 { color: #40c4ff; }
  button { background: linear-gradient(135deg, #00e676, #40c4ff); color: #051018; border: none; border-radius: 12px; padding: 14px 30px; font-size: 16px; font-weight: 800; cursor: pointer; transition: transform .15s; }
  button:hover { transform: translateY(-2px); }
  .celebracion { font-size: 2.5rem; font-weight: 800; color: #00e676; margin-top: 20px; }
</style>
</head>
<body>
  <main>
    <h1>Prode Mundial 2026</h1>
    <p>Empresa base — ambiente de referencia (dev · QA · prod)</p>
    <button id="btn" onclick="festejar()">⚽ ¡DALE QUE ES GOOOL!</button>
    <div class="celebracion" id="cel" style="display:none">¡G O O O L!</div>
  </main>
  <script>
    function festejar() { document.getElementById('cel').style.display = 'block'; }
  </script>
</body>
</html>
